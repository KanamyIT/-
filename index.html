<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News/Translate by Kanamy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --orange: #FF6B35;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: #2a2a2a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
        }

        header { 
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 20px 5%;
        }
        
        .logo { 
            font-size: 20px; 
            font-weight: 300;
            cursor: pointer;
            text-align: center;
        }
        .logo span { color: var(--orange); font-weight: 600; }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 60px 20px;
        }

        .hero { 
            text-align: center; 
            margin-bottom: 60px;
        }
        
        .hero h1 { 
            font-size: 48px; 
            font-weight: 300;
            margin-bottom: 30px;
            color: var(--text);
        }
        .hero h1 span { color: var(--orange); }

        .tabs { 
            display: inline-flex;
            gap: 4px;
            background: var(--surface);
            padding: 4px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        
        .tab-btn { 
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .tab-btn.active { 
            background: var(--orange);
            color: #fff;
        }

        .input-area { 
            display: none; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .input-area.active { display: block; }

        input, textarea { 
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
        }
        input:focus, textarea:focus { 
            border-color: var(--orange);
            outline: none;
        }
        textarea { min-height: 100px; }

        .btn-main { 
            margin-top: 12px;
            padding: 12px 24px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-main:hover { 
            transform: translateY(-2px);
        }

        .categories { 
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .cat-btn { 
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .cat-btn.active { 
            background: var(--orange);
            color: #fff;
            border-color: var(--orange);
        }

        .news-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .news-card { 
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .news-card:hover { 
            transform: translateY(-4px);
            border-color: var(--orange);
        }
        
        .tag-badge { 
            font-size: 10px;
            color: var(--orange);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .news-title { 
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
        }

        .article-view { 
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            margin-top: 40px;
            display: none;
            border: 1px solid var(--border);
        }
        .article-view h1, .article-view h2 {
            color: var(--orange);
            margin: 20px 0 10px 0;
        }
        .article-view p {
            margin: 10px 0;
            line-height: 1.7;
        }
        .article-view img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .loader { 
            display: none;
            margin: 40px auto;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status {
            text-align: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 14px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--orange);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            border: none;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .article-view { padding: 20px; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">News/Translate <span>by Kanamy</span></div>
</header>

<div class="container">
    <div class="hero">
        <h1>Умный <span>переводчик</span></h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('url')">🔗 Ссылка</button>
            <button class="tab-btn" onclick="switchMode('text')">📝 Текст</button>
        </div>

        <div id="urlMode" class="input-area active">
            <input type="text" id="urlInput" placeholder="https://example.com/article" />
            <button class="btn-main" onclick="translateUrl()">Перевести статью</button>
        </div>

        <div id="textMode" class="input-area">
            <textarea id="textInput" placeholder="Введите текст для перевода..."></textarea>
            <button class="btn-main" onclick="translateText()">Перевести текст</button>
        </div>
    </div>

    <div id="newsSection">
        <div class="categories">
            <button class="cat-btn active" onclick="loadCategory('programming', this)">Программирование</button>
            <button class="cat-btn" onclick="loadCategory('history', this)">История</button>
            <button class="cat-btn" onclick="loadCategory('gaming', this)">Игры</button>
            <button class="cat-btn" onclick="loadCategory('movies', this)">Кино</button>
        </div>
        <div class="status" id="status">Загрузка...</div>
        <div class="news-grid" id="newsGrid"></div>
    </div>

    <div class="loader" id="loader"></div>
    <div id="result" class="article-view"></div>
</div>

<script>
console.log('🚀 App started');

// API base URL - меняй на свой если деплоишь
const API_BASE = window.location.origin;

window.onload = function() {
    console.log('📍 API Base:', API_BASE);
    loadCategory('programming', document.querySelector('.cat-btn.active'));
};

function goHome() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('newsSection').style.display = 'block';
    document.getElementById('loader').style.display = 'none';
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function switchMode(mode) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.input-area').forEach(a => a.classList.remove('active'));
    
    if(mode === 'url') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('urlMode').classList.add('active');
        document.getElementById('newsSection').style.display = 'block';
    } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('textMode').classList.add('active');
        document.getElementById('newsSection').style.display = 'none';
    }
    document.getElementById('result').style.display = 'none';
}

async function loadCategory(cat, btn) {
    console.log('\n📰 Loading category:', cat);
    
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    
    const grid = document.getElementById('newsGrid');
    const status = document.getElementById('status');
    
    grid.innerHTML = '';
    status.textContent = 'Загружаю статьи...';
    status.style.display = 'block';
    status.style.color = 'var(--text-dim)';

    try {
        const url = `${API_BASE}/feed?category=${cat}`;
        console.log('📡 Fetching:', url);
        
        const res = await fetch(url);
        
        console.log('📊 Response status:', res.status);
        
        if(!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }
        
        const data = await res.json();
        console.log('✅ Data received:', data);
        console.log('📦 Articles count:', data.articles?.length || 0);
        
        status.style.display = 'none';
        
        if(!data.articles || data.articles.length === 0) {
            status.textContent = 'Нет статей в этой категории';
            status.style.display = 'block';
            return;
        }

        // Отрисовываем карточки
        data.articles.forEach((art, idx) => {
            // Проверяем что у статьи есть ссылка
            if(!art.link || !art.link.startsWith('http')) {
                console.warn(`⚠️ Invalid link for article ${idx}:`, art);
                return;
            }
            
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
                <div class="tag-badge">${art.tag || 'NEWS'}</div>
                <div class="news-title">${art.title || 'Без названия'}</div>
            `;
            card.onclick = () => translateUrl(art.link);
            grid.appendChild(card);
        });
        
        console.log('✅ Rendered', grid.children.length, 'cards\n');
        
    } catch(e) { 
        console.error('❌ Load error:', e);
        status.textContent = 'Ошибка загрузки: ' + e.message;
        status.style.color = '#ff6b6b';
        status.style.display = 'block';
    }
}

async function translateUrl(url = null) {
    const inputUrl = url || document.getElementById('urlInput').value.trim();
    
    if(!inputUrl) {
        alert('Введите ссылку!');
        return;
    }
    
    // Валидация URL
    if(!inputUrl.startsWith('http://') && !inputUrl.startsWith('https://')) {
        alert('Ссылка должна начинаться с http:// или https://');
        return;
    }
    
    console.log('\n🔄 Translating:', inputUrl);
    
    document.getElementById('newsSection').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('loader').style.display = 'block';

    try {
        const apiUrl = `${API_BASE}/translate`;
        console.log('📡 Posting to:', apiUrl);
        
        const res = await fetch(apiUrl, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: inputUrl})
        });
        
        console.log('📊 Response status:', res.status);
        
        if(!res.ok) {
            const errData = await res.json();
            console.error('❌ Server error:', errData);
            throw new Error(errData.error || `HTTP ${res.status}`);
        }
        
        const data = await res.json();
        console.log('✅ Translation received');
        console.log('📊 Word count:', data.word_count);
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <button class="back-btn" onclick="goHome()">← Назад</button>
            <p style="color: var(--text-dim); margin-bottom: 20px;">Переведено слов: ${data.word_count}</p>
            ${data.translated_html}
        `;
        resultDiv.style.display = 'block';
        
        window.scrollTo({top: 0, behavior: 'smooth'});
        
        console.log('✅ Article displayed\n');
        
    } catch(e) {
        console.error('❌ Translation error:', e);
        alert('Ошибка перевода: ' + e.message);
        goHome();
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}

async function translateText() {
    const text = document.getElementById('textInput').value.trim();
    
    if(!text) {
        alert('Введите текст!');
        return;
    }
    
    console.log('\n🔄 Translating text:', text.length, 'chars');
    
    document.getElementById('loader').style.display = 'block';

    try {
        const res = await fetch(`${API_BASE}/translate_text`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text})
        });
        
        if(!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error || 'Ошибка сервера');
        }
        
        const data = await res.json();
        
        console.log('✅ Text translated\n');
        
        document.getElementById('result').innerHTML = `
            <button class="back-btn" onclick="goHome()">← Назад</button>
            <div style="background: var(--bg); padding: 20px; border-radius: 8px;">
                <h3 style="color: var(--orange); margin-bottom: 10px;">Перевод:</h3>
                <p style="line-height: 1.8;">${data.result}</p>
            </div>
        `;
        document.getElementById('result').style.display = 'block';
        document.getElementById('newsSection').style.display = 'none';
        
        window.scrollTo({top: 0, behavior: 'smooth'});
        
    } catch(e) { 
        console.error('❌ Text translation error:', e);
        alert('Ошибка перевода: ' + e.message);
    } finally { 
        document.getElementById('loader').style.display = 'none'; 
    }
}
</script>

</body>
</html>

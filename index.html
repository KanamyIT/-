<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamy Translate 🦊</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f8;
            --text-color: #2d3748;
            --card-bg: #ffffff;
            --accent: #ff6b6b; /* Коралловый цвет бренда */
            --accent-hover: #ff5252;
        }

        /* Темная тема */
        body.dark-mode {
            --bg-color: #1a202c;
            --text-color: #e2e8f0;
            --card-bg: #2d3748;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        /* Шапка */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--accent); 
            display: flex; 
            align-items: center; 
            gap: 10px;
            letter-spacing: -1px;
        }
        
        .theme-btn {
            background: transparent;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .theme-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Контейнер */
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        /* Поле ввода */
        .search-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s;
        }
        .search-box:hover { transform: translateY(-5px); }

        h1 { margin-top: 0; }
        p { color: #718096; margin-bottom: 30px; font-size: 18px; }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background: var(--bg-color);
            color: var(--text-color);
            transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .btn-go {
            padding: 16px 30px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
            transition: 0.2s;
        }
        .btn-go:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
        }

        /* Результат (Статья) */
        .article-view {
            margin-top: 40px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            line-height: 1.8;
            font-size: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: none; /* Скрыто по умолчанию */
            animation: slideUp 0.5s ease;
        }

        /* Стили внутри статьи (пришедшие с сервера) */
        .article-view img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 30px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: block; /* Чтобы картинка не прыгала */
            margin-left: auto; 
            margin-right: auto;
        }
        .article-view h1, .article-view h2, .article-view h3 { 
            color: var(--accent); 
            margin-top: 40px; 
            line-height: 1.3;
        }
        .article-view p { color: var(--text-color); margin-bottom: 20px; text-align: left; }
        .article-view ul, .article-view ol { text-align: left; margin-left: 20px; }
        .article-view li { margin-bottom: 10px; }

        /* Загрузка */
        .loader {
            display: none;
            width: 50px; height: 50px;
            border: 5px solid #eee;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Адаптив */
        @media (max-width: 600px) {
            .container { margin: 20px auto; }
            .search-box { padding: 20px; }
            .article-view { padding: 20px; font-size: 16px; }
            h1 { font-size: 24px; }
            .btn-go { width: 100%; }
        }

    </style>
</head>
<body>

<header>
    <div class="logo">🦊 Kanamy Translate</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Тема</button>
</header>

<div class="container">
    <div class="search-box">
        <h1>Весь интернет на русском</h1>
        <p>Вставь ссылку на английскую статью. Мы переведем текст, но оставим картинки и красоту.</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Вставьте ссылку (https://...)" />
            <button class="btn-go" onclick="start()">Перевести</button>
        </div>
        
        <div class="loader" id="loader"></div>
    </div>

    <div id="result" class="article-view">
        <!-- Сюда загрузится статья -->
    </div>
</div>

<script>
    // ТВОЯ ССЫЛКА НА RENDER
    const API_URL = 'https://my-translator-zvrl.onrender.com/translate';

    async function start() {
        const url = document.getElementById('urlInput').value;
        const resDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if(!url) {
            alert("Пожалуйста, вставьте ссылку!"); 
            return;
        }

        // Показываем загрузку
        loader.style.display = 'block';
        resDiv.style.display = 'none';

        try {
            console.log("Запрос на:", API_URL);
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const data = await response.json();

            if(data.error) {
                alert("Ошибка сервера: " + data.error);
            } else {
                // Вставляем полученный HTML
                resDiv.innerHTML = data.translated_html;
                resDiv.style.display = 'block';
                
                // Плавный скролл к статье
                resDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        } catch(e) {
            console.error(e);
            alert("Ошибка соединения! Возможно, сервер на Render еще спит. Подожди минуту и попробуй снова.");
        } finally {
            loader.style.display = 'none';
        }
    }

    // Переключатель темы
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const btn = document.querySelector('.theme-btn');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerText = "☀️ Тема";
        } else {
            btn.innerText = "🌙 Тема";
        }
    }
</script>

</body>
</html>

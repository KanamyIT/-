<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamy Translate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --accent: #ff8c00;
        }
        body.dark-mode {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-main: #edf2f7;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; transition: 0.3s; }
        
        header { background: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .nav-btn { background: none; border: none; color: var(--text-main); font-weight: 600; padding: 8px 16px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .nav-btn:hover { background: rgba(255, 140, 0, 0.1); color: var(--accent); }
        .nav-btn.active { background: var(--accent); color: white; }
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .section { display: none; animation: fade 0.3s; }
        .section.active { display: block; }
        
        .hero { text-align: center; padding: 50px 30px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .input-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input { flex: 1; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; min-width: 200px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { transform: translateY(-2px); }
        
        .article-view { background: var(--card-bg); padding: 40px; border-radius: 20px; margin-top: 30px; line-height: 1.8; font-size: 18px; }
        .article-view img { max-width: 100%; border-radius: 12px; margin: 20px auto; display: block; }
        .article-view pre { background: #1a202c; color: #edf2f7; padding: 20px; border-radius: 10px; overflow-x: auto; font-size: 14px; }
        .article-view code { background: rgba(255, 140, 0, 0.1); padding: 2px 5px; border-radius: 4px; color: var(--accent); font-family: monospace; }
        .article-view pre code { background: transparent; color: inherit; padding: 0; }

        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .news-card { background: var(--card-bg); padding: 20px; border-radius: 15px; cursor: pointer; border-left: 4px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showSection('home')">Kanamy</div>
    <nav>
        <button class="nav-btn active" onclick="showSection('home')" id="btn-home">Переводчик</button>
        <button class="nav-btn" onclick="showSection('feed')" id="btn-feed">🔥 Лента</button>
        <button class="nav-btn" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
    </nav>
</header>

<div class="container">
    <!-- ГЛАВНАЯ -->
    <div id="home" class="section active">
        <div class="hero">
            <h1>Kanamy Translate</h1>
            <p>Умный переводчик IT-статей. Код остается кодом.</p>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Вставьте ссылку (https://...)" />
                <button class="btn-main" onclick="translateUrl()">Перевести</button>
            </div>
            <div class="loader" id="loader"></div>
            <div id="status" style="margin-top: 15px; font-size: 13px; color: #718096; font-weight: 600;"></div>
        </div>
        <div id="result" class="article-view" style="display: none;"></div>
    </div>

    <!-- ЛЕНТА -->
    <div id="feed" class="section">
        <h2 style="text-align: center">Свежие статьи</h2>
        <div class="loader" id="feedLoader"></div>
        <div class="news-grid" id="newsGrid"></div>
    </div>
</div>

<script>
    // ТВОЙ СЕРВЕР (Render)
    const API = 'https://my-translator-zvrl.onrender.com';

    // 1. Функция переключения вкладок
    function showSection(id) {
        // Скрываем все секции
        document.querySelectorAll('.section').forEach(e => e.classList.remove('active'));
        // Показываем нужную
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        
        // Обновляем кнопки в меню
        document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
        const btn = document.getElementById('btn-' + id);
        if(btn) btn.classList.add('active');
    }

    // 2. Авто-запуск при загрузке страницы
    window.onload = function() {
        console.log("Скрипт загружен. Проверяем сервер...");
        const statusEl = document.getElementById('status');
        
        if(statusEl) statusEl.innerText = "Подключаемся к серверу... 📡";

        fetch(API + '/')
            .then(res => {
                if(res.ok) {
                    console.log("Сервер жив!");
                    if(statusEl) statusEl.innerText = "Сервер готов к работе ✅";
                    if(statusEl) statusEl.style.color = "green";
                    loadFeed(); // Грузим ленту фоном
                } else {
                    throw new Error("Сервер вернул ошибку");
                }
            })
            .catch((e) => {
                console.log("Сервер спит или ошибка:", e);
                if(statusEl) statusEl.innerText = "Сервер просыпается (подождите ~30 сек)... ⏳";
                if(statusEl) statusEl.style.color = "#e07b00"; // Оранжевый
            });
    };

    // 3. Логика перевода
    async function translateUrl(url = null) {
        const inputUrl = url || document.getElementById('urlInput').value;
        if(!inputUrl) return alert("Пожалуйста, вставьте ссылку!");
        
        // Переключаемся на главную
        showSection('home');
        document.getElementById('urlInput').value = inputUrl;
        
        const resDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        const statusEl = document.getElementById('status');
        
        loader.style.display = 'block';
        resDiv.style.display = 'none';
        if(statusEl) statusEl.innerText = "Скачиваю и перевожу статью... 🧠";

        try {
            const res = await fetch(API + '/translate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: inputUrl})
            });
            const data = await res.json();
            
            if(data.error) throw new Error(data.error);
            
            resDiv.innerHTML = data.translated_html;
            resDiv.style.display = 'block';
            resDiv.scrollIntoView({ behavior: 'smooth' });
            
            if(statusEl) statusEl.innerText = "Готово! ✅";
            
        } catch(e) {
            alert("Ошибка: " + e.message + "\nВозможно, сайт защищен от ботов.");
            if(statusEl) statusEl.innerText = "Ошибка перевода ❌";
        } finally {
            loader.style.display = 'none';
        }
    }

    // 4. Логика ленты новостей
    async function loadFeed() {
        const grid = document.getElementById('newsGrid');
        // Если новости уже есть - не грузим заново
        if(!grid || grid.children.length > 0) return;
        
        const loader = document.getElementById('feedLoader');
        if(loader) loader.style.display = 'block';
        
        try {
            const res = await fetch(API + '/feed');
            const data = await res.json();
            
            grid.innerHTML = "";
            if(!data.articles || data.articles.length === 0) {
                 grid.innerHTML = "<p style='text-align:center; color:#718096'>Новостей пока нет :(</p>";
                 return;
            }

            data.articles.forEach(art => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div style="font-size: 11px; font-weight: 800; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px;">${art.tag}</div>
                    <div style="font-size: 16px; font-weight: 700; margin: 12px 0; color: var(--text-main); line-height: 1.4;">${art.title}</div>
                    <div style="font-size: 13px; color: #718096; margin-bottom: 15px;">${art.original_title}</div>
                    <div style="margin-top: auto; color: var(--accent); font-weight: bold; font-size: 14px;">Читать статью →</div>
                `;
                // Клик по карточке -> Перевод
                card.onclick = () => translateUrl(art.link);
                grid.appendChild(card);
            });
        } catch(e) { 
            console.error(e);
            if(grid) grid.innerHTML = "<p style='text-align:center'>Не удалось загрузить ленту.</p>";
        } 
        finally { if(loader) loader.style.display = 'none'; }
    }
</script>

</body>
</html>

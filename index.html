<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamy Translate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --accent: #ff8c00;
        }
        body.dark-mode {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-main: #edf2f7;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; transition: 0.3s; }
        
        header { background: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .nav-btn { background: none; border: none; color: var(--text-main); font-weight: 600; padding: 8px 16px; cursor: pointer; border-radius: 8px; }
        .nav-btn.active { background: var(--accent); color: white; }
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .hero { text-align: center; padding: 50px 30px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input { flex: 1; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; width: 60%; margin-right: 10px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .article-view { background: var(--card-bg); padding: 40px; border-radius: 20px; margin-top: 30px; line-height: 1.8; font-size: 18px; }
        .article-view img { max-width: 100%; border-radius: 12px; margin: 20px 0; display: block; margin: 0 auto; }
        .article-view pre { background: #1a202c; color: #edf2f7; padding: 20px; border-radius: 10px; overflow-x: auto; font-size: 14px; }

        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .news-card { background: var(--card-bg); padding: 20px; border-radius: 15px; cursor: pointer; border-left: 4px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.2s; }
        .news-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showSection('home')">Kanamy</div>
    <nav>
        <button class="nav-btn active" onclick="showSection('home')" id="btn-home">Переводчик</button>
        <button class="nav-btn" onclick="showSection('feed')" id="btn-feed">🔥 Лента</button>
        <button class="nav-btn" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
    </nav>
</header>

<div class="container">
    <div id="home" class="section active">
        <div class="hero">
            <h1>Kanamy Translate</h1>
            <p>Стабильный перевод статей. Сохраняем код, картинки и нервы.</p>
            <div>
                <input type="text" id="urlInput" placeholder="https://..." />
                <button class="btn-main" onclick="translateUrl()">Перевести</button>
            </div>
            <div class="loader" id="loader"></div>
            <div id="status" style="margin-top: 10px; font-size: 12px; color: #718096;"></div>
        </div>
        <div id="result" class="article-view" style="display: none;"></div>
    </div>

    <div id="feed" class="section">
        <h2 style="text-align: center">Свежие статьи</h2>
        <div class="loader" id="feedLoader"></div>
        <div class="news-grid" id="newsGrid"></div>
    </div>
</div>

<script>
    const API = 'https://my-translator-zvrl.onrender.com';

    // АВТО-ПРОБУЖДЕНИЕ СЕРВЕРА
    window.onload = function() {
        console.log("Будим сервер...");
        document.getElementById('status').innerText = "Подключаемся к серверу...";
        fetch(API + '/')
            .then(() => {
                console.log("Сервер готов!");
                document.getElementById('status').innerText = "Сервер готов к работе ✅";
                loadFeed(); // Грузим новости фоном
            })
            .catch(() => {
                document.getElementById('status').innerText = "Сервер просыпается (подождите 30 сек)... ⏳";
            });
    };

    function showSection(id) {
        document.querySelectorAll('.section').forEach(e => e.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
        if(id==='home') document.getElementById('btn-home').classList.add('active');
        if(id==='feed') document.getElementById('btn-feed').classList.add('active');
    }

    async function translateUrl(url = null) {
        const inputUrl = url || document.getElementById('urlInput').value;
        if(!inputUrl) return alert("Ссылку в студию!");
        
        showSection('home');
        document.getElementById('urlInput').value = inputUrl;
        
        const resDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        loader.style.display = 'block';
        resDiv.style.display = 'none';

        try {
            const res = await fetch(API + '/translate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: inputUrl})
            });
            const data = await res.json();
            
            if(data.error) throw new Error(data.error);
            
            resDiv.innerHTML = data.translated_html;
            resDiv.style.display = 'block';
            resDiv.scrollIntoView({ behavior: 'smooth' });
        } catch(e) {
            alert("Ошибка: " + e.message + "\nПопробуй другую статью или подожди минуту.");
        } finally {
            loader.style.display = 'none';
        }
    }

    async function loadFeed() {
        const grid = document.getElementById('newsGrid');
        if(grid.children.length > 0) return;
        
        const loader = document.getElementById('feedLoader');
        loader.style.display = 'block';
        
        try {
            const res = await fetch(API + '/feed');
            const data = await res.json();
            
            grid.innerHTML = "";
            data.articles.forEach(art => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div style="font-size: 12px; font-weight: 800; color: #718096; text-transform: uppercase;">${art.tag}</div>
                    <div style="font-size: 16px; font-weight: 700; margin: 10px 0;">${art.title}</div>
                    <div style="font-size: 13px; color: #718096;">${art.original_title}</div>
                `;
                card.onclick = () => translateUrl(art.link);
                grid.appendChild(card);
            });
        } catch(e) { console.log("Ошибка ленты"); } 
        finally { loader.style.display = 'none'; }
    }
</script>

</body>
</html>
